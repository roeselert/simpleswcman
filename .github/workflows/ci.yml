name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Duplicate code detection
        run: npm run cpd

      - name: Run tests
        run: npm test

      - name: Generate test report
        if: always()
        run: node --experimental-vm-modules node_modules/.bin/mocha 'src/**/*_test.js' --timeout 10000 --reporter json > test-report.json; true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.json

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Publish app code to public branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SHA=$(git rev-parse --short HEAD)

          # Copy src/ excluding test files and non-app files
          cp -r src /tmp/app
          rm -rf /tmp/app/test
          rm -f /tmp/app/review_findings.md

          # Create orphan public branch and replace content with app files at root
          git checkout --orphan public
          git rm -rf .

          cp -r /tmp/app/. .

          git add .
          git diff --cached --quiet || git commit -m "Publish app from main@${SHA}"
          git push --force origin public

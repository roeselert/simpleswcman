name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      skip_cpd:
        description: "Skip duplicate code detection (manual override)"
        required: false
        default: false
        type: boolean

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Lint
        run: npm run lint

  cpd:
    runs-on: ubuntu-latest
    if: inputs.skip_cpd != true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Duplicate code detection
        run: npm run cpd

  test:
    needs: [lint, cpd]
    if: |
      always() &&
      needs.lint.result == 'success' &&
      (needs.cpd.result == 'success' || needs.cpd.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run tests
        run: npm test
      - name: Generate test report
        if: always()
        run: node --experimental-vm-modules node_modules/.bin/mocha 'src/**/*_test.js' --timeout 10000 --reporter json > test-report.json; true
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.json

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: needs.test.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Publish app code to public branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SHA=$(git rev-parse --short HEAD)

          cp -r src /tmp/app
          rm -rf /tmp/app/test
          rm -f /tmp/app/review_findings.md

          git checkout --orphan public
          git rm -rf .

          cp -r /tmp/app/. .

          git add .
          git diff --cached --quiet || git commit -m "Publish app from main@${SHA}"
          git push --force origin public
